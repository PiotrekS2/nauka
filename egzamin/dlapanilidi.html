<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<p id="wynik"></p>
    <script>
    var wypisz=document.getElementById('wynik');

wypisz.innerHTML+="zad 1"+"<br>";
for(var i=75; i >=0; i--)
{
    wypisz.innerHTML+=i+" ";
}
wypisz.innerHTML+="zad 2"+"<br>";

var a=1;

for(var i=0;i<35;i++)
{
    wypisz.innerHTML+=a+" ";
    a+=2;
}

wypisz.innerHTML+="zad 3"+"<br>";

var n=5;
var silnia=1;

for(var i=1;i<=n;i++)
{
    silnia*=i;
    wypisz.innerHTML+=silnia+"<br>";
}
wypisz.innerHTML+="zad 4"+"<br>";

var tab= [7,3,1,6,9,5,4,10,3,2,4,3,6,12,15,4]

var suma=0;
for(var i=0;i<tab.length;i++)
{
    suma+=tab[i];
}
var srednia = suma / tab.length;
wypisz.innerHTML+=" "+srednia+" "+"<br>";

wypisz.innerHTML+="zad 5"+"<br>";
var j=0;
while (j<tab.length)
{
    wypisz.innerHTML+=tab[j]+" ";
    j++;
}



        </script>
</body>
</html>
