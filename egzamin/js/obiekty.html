<body>
    <p id="wynik"></p>
<script>
var wypisz=document.getElementById("wynik");
wypisz.innerHTML+="<h1>obiekt</h1>"


function Osoba(imie,nazwisko,wiek)
{
    this.imie=imie;
    this.nazwisko=nazwisko;
    this.wiek=wiek;

}

var osoba1= new Osoba("Jan","Kowalski",26);
var osoba2= new Osoba("rogI","iksńleL",12);

wypisz.innerHTML+="imie: "+osoba1.imie+"<br>";
wypisz.innerHTML+="nazwisko: "+osoba1.nazwisko+"<br>";
wypisz.innerHTML+="wiek: "+osoba1.wiek+"<br>"+"<br>"+"<br>"+"<br>";


wypisz.innerHTML+="imie: "+osoba2.imie+"<br>";
wypisz.innerHTML+="nazwisko: "+osoba2.nazwisko+"<br>";
wypisz.innerHTML+="wiek: "+osoba2.wiek+"<br>"+"<br>"+"<br>";


function WypiszDane(obiekt)
{    for(x in obiekt)
{
    wypisz.innerHTML+=obiekt[x]+" ";
}
}
var Osoba3= new Osoba("Adam","Samsel",18);
WypiszDane(Osoba3);

function Samochod(marka,model,pojemnosc,rok,kolor)
{

    this.model=model;

    this.rok=rok;
    this.kolor=kolor;
    
}
var samochod1= new Samochod("Ford","Fiesta",1.6,2004,"Czarny");

wypisz.innerHTML+="Marka: "+samochod1.marka+"<br>";

wypisz.innerHTML+="Kolor: "+samochod1.kolor+"<br>";

</script>
